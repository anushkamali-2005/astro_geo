global:
  scrape_interval: 15s # How frequently to scrape targets
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'fastapi_app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000'] # Using Docker Compose service name 'api'
