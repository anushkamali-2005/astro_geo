global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Local Docker Compose only.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Local backend container target (service name "api").
  - job_name: "fastapi_app"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]

  - job_name: "mlflow"
    static_configs:
      - targets: ["mlflow:5000"]
