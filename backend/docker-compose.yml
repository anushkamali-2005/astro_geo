version: '3.8'

services:
  api:
    build: 
      context: ../
      dockerfile: Dockerfile
    ports:
      - "8095:8000"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=astrogeo
      - WEB_CONCURRENCY=4
      - THREAD_POOL_MAX_WORKERS=128
      - MAX_CONCURRENT_GRAPH_QUERIES=40
      - MAX_CONCURRENT_QUERY_ENDPOINT=80
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    command: postgres -c max_connections=250 -c shared_buffers=256MB
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=astrogeo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:12.0.4
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.2
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5001:5000"

volumes:
  postgres_data:
  grafana_data:
  mlflow_data:
