# ─────────────────────────────────────────────────────────────────────────────
# Model hyperparameters — DVC reads param keys from this file for tracking.
# Modify values here then run `dvc repro` to trigger the affected stages.
# ─────────────────────────────────────────────────────────────────────────────

# Ensemble architecture (matches 04_train_model.py)
model_type: rf_lr_voting_ensemble   # descriptor only (not a library flag)

# RandomForestClassifier params
n_estimators: 300
max_depth: 6
min_samples_leaf: 5
class_weight: balanced
random_seed: 42

# LogisticRegression params
lr_C: 1.0
lr_max_iter: 1000

# Data splits
train_split: 0.80
test_split: 0.20

# Cross-validation
cv_n_splits: 5

# Feature engineering
rolling_window_days: 3

# Thresholds
go_threshold: 0.75       # P(go) > go_threshold  → 'Favorable'
marginal_threshold: 0.50 # go_threshold > P ≥ marginal_threshold → 'Marginal'
